name: docker

on:
  push:
    branches: [main, master]
    tags: ["v*"]
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/docker.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/docker.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  # Pinned so the published image name is always llm-tool-whisper, independent
  # of the GitHub repository's display name. Must match the image: line in
  # docker-compose.yml and the references in README.md.
  IMAGE_NAME: starlight02/llm-tool-whisper

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
      version_tag: ${{ steps.version-tag.outputs.version_tag }}
      version_minor_tag: ${{ steps.version-tag.outputs.version_minor_tag }}
      version_major_tag: ${{ steps.version-tag.outputs.version_major_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Fetch tags
        run: git fetch --tags --force || true

      - name: Create git tag from Cargo.toml version
        id: version-tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')
        shell: bash
        run: |
          set -euo pipefail

          version="$(python3 - <<'PY'
          import pathlib
          import tomllib

          data = tomllib.loads(pathlib.Path("Cargo.toml").read_text())
          print(data["package"]["version"])
          PY
          )"
          tag="v${version}"
          before="${{ github.event.before }}"
          old_version=""

          if [[ -n "$before" && ! "$before" =~ ^0+$ ]] && git cat-file -e "$before:Cargo.toml" 2>/dev/null; then
            old_version="$(git show "$before:Cargo.toml" | python3 -c 'import sys, tomllib; print(tomllib.loads(sys.stdin.read())["package"]["version"])')"
          fi

          version_changed=false
          if [[ "$old_version" != "$version" ]]; then
            version_changed=true
          fi

          tag_sha=""
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            tag_sha="$(git rev-list -n 1 "$tag")"
          fi

          if [[ -n "$tag_sha" && "$tag_sha" == "${{ github.sha }}" ]]; then
            echo "Version tag ${tag} already points at this commit."
            echo "version_tag=${tag}" >> "$GITHUB_OUTPUT"
          elif [[ -n "$tag_sha" ]]; then
            if [[ "$version_changed" == "true" ]]; then
              echo "::error::Cargo.toml version ${version} changed, but tag ${tag} already points at ${tag_sha}. Bump the version or move/delete the existing tag intentionally."
              exit 1
            fi
            echo "Version ${version} is already tagged at ${tag_sha}; not creating a new tag for this non-version push."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "$tag" "${{ github.sha }}"
            git push origin "refs/tags/${tag}"
            echo "Created version tag ${tag}."
            echo "version_tag=${tag}" >> "$GITHUB_OUTPUT"
          fi

          if [[ -n "${tag_sha}" && "${tag_sha}" != "${{ github.sha }}" && "$version_changed" != "true" ]]; then
            exit 0
          fi

          if [[ "$version" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "version_minor_tag=v${BASH_REMATCH[1]}.${BASH_REMATCH[2]}" >> "$GITHUB_OUTPUT"
            echo "version_major_tag=v${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          fi

      - name: Decide whether Docker build is needed
        id: filter
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            changed="$(git diff --name-only HEAD^1 HEAD || true)"
            if grep -Eq '^(Dockerfile|\.dockerignore|Cargo\.toml|Cargo\.lock|\.github/workflows/docker\.yml)$' <<<"$changed" || grep -Eq '^(src/|Cargo)' <<<"$changed"; then
              echo "docker=true" >> "$GITHUB_OUTPUT"
            else
              echo "docker=false" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          # Non-PR push: branch or tag.
          # On regular branch pushes we update :latest + :sha, and if this run
          # created the Cargo.toml version tag, the merge job also applies the
          # release tags. A tag created with GITHUB_TOKEN does not trigger a
          # second workflow run, so the branch run must publish those tags itself.
          if [[ "${{ github.ref }}" == refs/heads/* ]]; then
            echo "docker=true" >> "$GITHUB_OUTPUT"
          else
            # tag push (refs/tags/v*)
            echo "docker=true" >> "$GITHUB_OUTPUT"
          fi

  # Lint + compile gate. Runs on every push and PR so warnings can never land
  # on master — `-D warnings` turns any rustc/clippy warning into a failure.
  # Skip on pure tag pushes (the commit was already checked when pushed to the branch).
  rust-check:
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.90.0
        with:
          components: clippy

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Clippy (deny warnings) + tests
        run: |
          cargo clippy --locked --all-targets -- -D warnings
          cargo test --locked

  # Build each architecture on a NATIVE runner — no QEMU emulation. amd64 runs
  # on the standard x86 runner, arm64 on GitHub's free arm64 runner. Each leg
  # pushes a digest-only image; the `merge` job stitches them into one
  # multi-arch manifest under the real tags. On pull_request nothing is pushed —
  # the build only proves the image still compiles on both arches.
  build:
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build (and push digest on non-PR)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          # On push/tag: produce a digest-only image and push it. On PR: build
          # into the cache only (no registry artifact, no credentials needed).
          outputs: ${{ github.event_name != 'pull_request' && format('type=image,name={0}/{1},push-by-digest=true,name-canonical=true,push=true', env.REGISTRY, env.IMAGE_NAME) || 'type=cacheonly' }}
          cache-from: type=gha,scope=llm-tool-whisper-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=llm-tool-whisper-${{ matrix.arch }}

      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # Stitch the per-arch digests into one multi-arch manifest and tag it. Runs
  # only when the build legs actually pushed (i.e. not on pull_request).
  merge:
    needs: [changes, build]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # short SHA on every build — always pullable & traceable to a commit
            type=sha,format=short
            # main branch -> latest
            type=raw,value=latest,enable={{is_default_branch}}
            # branch push with an auto-created Cargo.toml version tag
            type=raw,value=${{ needs.changes.outputs.version_tag }},enable=${{ needs.changes.outputs.version_tag != '' }}
            type=raw,value=${{ needs.changes.outputs.version_minor_tag }},enable=${{ needs.changes.outputs.version_minor_tag != '' }}
            type=raw,value=${{ needs.changes.outputs.version_major_tag }},enable=${{ needs.changes.outputs.version_major_tag != '' }}
            # v1.2.3 git tag -> v1.2.3, v1.2, v1
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Create and push manifest list
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect published image
        run: |
          docker buildx imagetools inspect \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
